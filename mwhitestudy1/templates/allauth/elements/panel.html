{% load allauth %}

<div class="card mb-5">
  <div class="card-content">
    <h2 class="title is-5">{% slot title %}{% endslot %}</h2>
    {% slot body %}{% endslot %}
    {% if slots.actions %}
      <ul>{% for action in slots.actions %}<li>{{ action }}</li>{% endfor %}</ul>
    {% endif %}
  </div>
</div>
