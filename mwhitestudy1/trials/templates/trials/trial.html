{% extends "base.html" %}
{% load static %}
{% block title %}Trial{% endblock title %}
{% block content %}
  <div id="trial-container">
    {% include "trials/partials/_stage_initial.html" %}
  </div>
{% endblock content %}
{% block inline_javascript %}
<script>
  function stampStageStart() {
    document.querySelectorAll('input[name="stage_start_time_ms"]').forEach(function(el) {
      if (!el.value) el.value = Date.now();
    });
  }
  document.addEventListener('DOMContentLoaded', stampStageStart);
  document.addEventListener('htmx:afterSwap', stampStageStart);
</script>
{% endblock inline_javascript %}
