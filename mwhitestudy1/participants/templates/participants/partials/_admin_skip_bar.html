{% if request.user.is_staff %}
  <div class="notification is-warning is-light py-2 px-4 mb-4" style="border-left: 4px solid #f0a500;">
    <div class="is-flex is-align-items-center is-justify-content-space-between">
      <span class="has-text-weight-semibold is-size-7">
        &#9654; Admin preview — participants do not see this bar
      </span>
      <a href="{% url 'participants:admin-skip' %}?from={{ current_page }}"
         class="button is-warning is-small ml-4">
        Skip this page &rarr;
      </a>
    </div>
  </div>
{% endif %}
